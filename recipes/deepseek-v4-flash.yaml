recipe_version: "1"
name: DeepSeek V4 Flash
description: Official DeepSeek V4 Flash recipe for dual DGX Spark TP=2 with CUDA graphs, fp8 KV cache, MTP, and 200K context.
model: deepseek-ai/DeepSeek-V4-Flash
container: vllm-node-dsv4
cluster_only: true

build_args:
  - --vllm-repo
  - https://github.com/jasl/vllm.git
  - --vllm-ref
  - codex/ds4-sm120-min-enable
  - --rebuild-vllm

defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 2
  pipeline_parallel: 1
  gpu_memory_utilization: 0.85
  max_model_len: 200000
  max_num_batched_tokens: 8192
  max_num_seqs: 4
  block_size: 256
  served_model_name: deepseek-v4-flash

env:
  TORCH_CUDA_ARCH_LIST: 12.1a
  VLLM_ALLOW_LONG_MAX_MODEL_LEN: "1"
  VLLM_ENGINE_READY_TIMEOUT_S: "7200"
  VLLM_RPC_TIMEOUT: "100000"
  VLLM_TRITON_MLA_SPARSE: "1"
  FLASHINFER_DISABLE_VERSION_CHECK: "1"
  TILELANG_CLEANUP_TEMP_FILES: "1"
  DG_JIT_USE_NVRTC: "0"
  DG_JIT_NVCC_COMPILER: /usr/local/cuda/bin/nvcc
  DG_JIT_PRINT_COMPILER_COMMAND: "1"
  NCCL_TIMEOUT: "3600"
  TORCH_NCCL_HEARTBEAT_TIMEOUT_SEC: "3600"

command: |
  vllm serve deepseek-ai/DeepSeek-V4-Flash \
    --served-model-name {served_model_name} \
    --host {host} \
    --port {port} \
    --trust-remote-code \
    --tensor-parallel-size {tensor_parallel} \
    --pipeline-parallel-size {pipeline_parallel} \
    --enable-expert-parallel \
    --kv-cache-dtype fp8 \
    --block-size {block_size} \
    --enable-prefix-caching \
    --max-model-len {max_model_len} \
    --max-num-seqs {max_num_seqs} \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --distributed-executor-backend mp \
    --no-enable-flashinfer-autotune \
    --compilation-config '{{"cudagraph_mode":"FULL_AND_PIECEWISE","custom_ops":["all"]}}' \
    --speculative-config '{{"method":"mtp","num_speculative_tokens":2}}' \
    --tokenizer-mode deepseek_v4 \
    --tool-call-parser deepseek_v4 \
    --enable-auto-tool-choice \
    --reasoning-parser deepseek_v4 \
    --reasoning-config '{{"reasoning_parser":"deepseek_v4","reasoning_start_str":"<think>","reasoning_end_str":"</think>"}}' \
    --default-chat-template-kwargs '{{"thinking":true}}' \
    --load-format safetensors
